<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <title>Shop</title>
</head>

<body>
    <section id="shop_container">
        <section id="top">
            <section id="first_section">
                <button>
                    <h2>Inventory</h2>
                </button>
                <br>
                <button>
                    <h2>All Items</h2>
                </button>
                <br>
                <button>
                    <h2>Sell</h2>
                </button>
            </section>
            <section id="second_section">
                <h1 id="shop">Shop</h1>
                <div id="money">
                    <h2 id="moneyText">$2090</h2>
                </div>
                <img src="../images/namebackplate.png">
            </section>
            <section id="third_section">
                <button>
                    <h2>Make potions</h2>
                </button>
                <br>
                <button>
                    <h2>Gamble</h2>
                </button>
                <br>
                <button>
                    <h2>End Day</h2>
                </button>
            </section>
        </section>
        <section id="bottom">
            <div id="slot1" class="slot"> <img id="itemImg1" src="../images/character_images/netanyahu.png"></div>
            <div id="slot2" class="slot"> <img id="itemImg2" src="../images/character_images/netanyahu.png"> </div>
            <div id="slot3" class="slot"> <img id="itemImg3" src="../images/character_images/netanyahu.png"> </div>
            <div id="slot4" class="slot"><img id="itemImg4" src="../images/character_images/netanyahu.png"></div>
            <div id="slot5" class="slot"><img id="itemImg5" src="../images/character_images/netanyahu.png"></div>
            <div id="slot6" class="slot"><img id="itemImg6" src="../images/character_images/netanyahu.png"></div>
            <div id="slot7" class="slot"><img id="itemImg7" src="../images/character_images/netanyahu.png"></div>
            <div id="slot8" class="slot"><img id="itemImg8" src="../images/character_images/netanyahu.png"></div>
            <div id="slot9" class="slot"><img id="itemImg9" src="../images/character_images/netanyahu.png"></div>
            <div id="slot10" class="slot"><img id="itemImg10" src="../images/character_images/netanyahu.png"></div>
        </section>
    </section>
    <script type="module" src="../../scripts/Shop.js"></script>
</body>

</html>
